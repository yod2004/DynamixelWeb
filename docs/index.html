<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DynamixelWeb</title>
</head>
<body>
  <div id="toast" style="display:none; position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.8); color:#fff; padding:10px 20px; border-radius:5px; z-index:1000; transition: opacity 0.3s;"></div>
  <button id="connectBtn">CONNECT USB</button>
  <fieldset>
    <legend>MOTOR1</legend>
    <label>ID:<input type="number" id="motor1Id" value="1" min="1" max="253" style="width: 50px;"></label>
    <label>LED:<input type="checkbox" id="isMotor1Led"/></label>
    <label>ENABLE:<input type="checkbox" id="isMotor1Enable"/></label>
    <select id="motor1Mode">
      <option value="Current">Current</option>
      <option value="Speed">Speed</option>
      <option value="Position">Position</option>
      <option value="ExtendedPosition">Extended Position</option>
    </select>
    A←</label><input type="range" min="-500" max="500" id="motor1Slider"/>→D
    <output id="motor1Value">0</output>
    </fieldset>
    
  <fieldset>
    <legend>MOTOR2</legend>
    <label>ID:<input type="number" id="motor2Id" value="2" min="1" max="253" style="width: 50px;"></label>
    <label>LED:<input type="checkbox" id="isMotor2Led"/></label>
    <label>ENABLE:<input type="checkbox" id="isMotor2Enable"/></label>
    <select id="motor2Mode">
      <option value="Current">Current</option>
      <option value="Speed">Speed</option>
      <option value="Position">Position</option>
      <option value="ExtendedPosition">Extended Position</option>
    </select>
    J←</label><input type="range" min="-500" max="500" id="motor2Slider"/>→L
    <output id="motor2Value">0</output>
  </fieldset>

  <script>
    let port;
    let writer;
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // 1. 接続処理（ここでのみポップアップが出ます）
    document.getElementById('connectBtn').addEventListener('click', async () => {
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 57600 }); // XC330の初期ボーレート
        writer = port.writable.getWriter();
        console.log("接続完了");
        showMessage("接続完了");
      } catch (error) {
        console.error("接続エラー:", error);
      }
    });

    // 2. コマンド送信処理
    async function sendWriteCommand(id, address, dataValue) {
      if (!writer) {
        showMessage("書き込み先が見つかりません");
        return;
      }

      // Protocol 2.0 パケット構築 (1バイト書き込み用)
      const payload = new Uint8Array([
        0xFF, 0xFF, 0xFD, 0x00, // Header
        id,                     // ID
        0x06, 0x00,             // Length (Instruction + Address + Data + CRC = 6)
        0x03,                   // Instruction (Write)
        address, 0x00,          // Address
        dataValue               // Data
      ]);

      const crc = calculateDynamixelCRC(payload);
      const packet = new Uint8Array(payload.length + 2);
      packet.set(payload);
      packet[payload.length]     = crc & 0xFF;
      packet[payload.length + 1] = (crc >> 8) & 0xFF;
      // 送信（ポートは閉じずに維持する）
      await writer.write(packet);
      console.log(`アドレス ${address} に ${dataValue} を送信しました`);
    }
    async function sendWriteCommand2Byte(id, address, dataValue){
      if(!writer) return;
      const unsignedVal = (dataValue < 0) ? dataValue + 65536 : dataValue;
      const byte1 = dataValue & 0xFF;
      const byte2 = (dataValue >> 8) & 0xFF;
      const payload = new Uint8Array([
        0xFF, 0xFF, 0xFD, 0x00,
        id,
        0x07, 0x00,
        0x03,
        address, 0x00,
        byte1, byte2
      ]);
      const crc = calculateDynamixelCRC(payload);
      const packet = new Uint8Array(payload.length + 2);
      packet.set(payload);
      packet[payload.length]     = crc & 0xFF;
      packet[payload.length + 1] = (crc >> 8) & 0xFF;
      // 送信（ポートは閉じずに維持する）
      await writer.write(packet);
      console.log(`アドレス ${address} に ${dataValue} を送信しました`);
    }
    async function sendWriteCommand4Byte(id, address, dataValue){
      if(!writer) return;
      const unsignedVal = dataValue >>> 0;
      const byte1 = dataValue & 0xFF;
      const byte2 = (dataValue >> 8) & 0xFF;
      const byte3 = (dataValue >> 16) & 0xFF;
      const byte4 = (dataValue >> 24) & 0xFF;
      const payload = new Uint8Array([
        0xFF, 0xFF, 0xFD, 0x00,
        id,
        0x09, 0x00,
        0x03,
        address, 0x00,
        byte1, byte2, byte3, byte4
      ]);
      const crc = calculateDynamixelCRC(payload);
      const packet = new Uint8Array(payload.length + 2);
      packet.set(payload);
      packet[payload.length]     = crc & 0xFF;
      packet[payload.length + 1] = (crc >> 8) & 0xFF;
      // 送信（ポートは閉じずに維持する）
      await writer.write(packet);
      console.log(`アドレス ${address} に ${dataValue} を送信しました`);
    }

    function updateMotor1(value){
      const mode = document.getElementById('motor1Mode').value;
      const id = parseInt(document.getElementById('motor1Id').value, 10);
      if(mode === 'Speed'){
        sendWriteCommand4Byte(id, 104, value);
      }else if(mode === 'Position' || mode === 'ExtendedPosition'){
        sendWriteCommand4Byte(id, 116, value);
      }else if(mode === 'Current'){
        sendWriteCommand2Byte(id, 102, value);
      }
    }
    function updateMotor2(value){
      const mode = document.getElementById('motor2Mode').value;
      const id = parseInt(document.getElementById('motor2Id').value, 10);
      if(mode === 'Speed'){
        sendWriteCommand4Byte(id, 104, value);
      }else if(mode === 'Position' || mode === 'ExtendedPosition'){
        sendWriteCommand4Byte(id, 116, value);
      }else if(mode === 'Current'){
        sendWriteCommand2Byte(id, 102, value);
      }
    }

    // 各ボタンのイベント
    document.getElementById('isMotor1Led').addEventListener('change', (e) => {
      const id = parseInt(document.getElementById('motor1Id').value, 10);
      sendWriteCommand(id, 0x41, e.target.checked ? 1 : 0);
    });
    document.getElementById('isMotor2Led').addEventListener('change', (e) => {
      const id = parseInt(document.getElementById('motor2Id').value, 10);
      sendWriteCommand(id, 0x41, e.target.checked ? 1 : 0);
    });
    document.getElementById('isMotor1Enable').addEventListener('change', (e)=>{
      const id = parseInt(document.getElementById('motor1Id').value, 10);
      const dataValue = e.target.checked ? 1 : 0;
      sendWriteCommand(id, 64, dataValue);
    });
    document.getElementById('isMotor2Enable').addEventListener('change', (e)=>{
      const id = parseInt(document.getElementById('motor2Id').value, 10);
      const dataValue = e.target.checked ? 1 : 0;
      sendWriteCommand(id, 64, dataValue);
    });
    document.getElementById('motor1Slider').addEventListener('input', (e)=>{
      const val = parseInt(e.target.value, 10);
      document.getElementById('motor1Value').textContent = val;
      updateMotor1(val);
    });
    document.getElementById('motor2Slider').addEventListener('input', (e)=>{
      const val = parseInt(e.target.value, 10);
      document.getElementById('motor2Value').textContent = val;
      updateMotor2(val);
    });

    document.getElementById('motor1Mode').addEventListener('change', async (e)=>{
      const id = parseInt(document.getElementById('motor1Id').value, 10);
      const mode = e.target.value;
      const slider = document.getElementById('motor1Slider');
      let modeValue=3;
      if(mode==="Current")
      {
        modeValue=0;
        slider.min = -910;
        slider.max = 910;
        slider.value = 0;
      }
      else if(mode==="Speed")
      {
        modeValue=1;
        slider.min = -320;
        slider.max = 320;
        slider.value = 0;
      }
      else if(mode==="Position")
      {
        modeValue=3;
        slider.min = 0;
        slider.max = 4095;
        slider.value = 2048;
      }
      else if(mode==="ExtendedPosition")
      {
        modeValue=4;
        slider.min = -4095;
        slider.max = 4095;
        slider.value = 0;
      }
      document.getElementById('motor1Value').textContent = slider.value;
      await sendWriteCommand(id, 64, 0);//トルクオフ
      document.getElementById('isMotor1Enable').checked = false;
      await sleep(100);
      await sendWriteCommand(id, 11, modeValue);
      console.log(`モータ${id}のモードを ${mode} (値:${modeValue}) に変更しました`);
    });
    document.getElementById('motor2Mode').addEventListener('change', async (e)=>{
      const id = parseInt(document.getElementById('motor2Id').value, 10);
      const mode = e.target.value;
      const slider = document.getElementById('motor2Slider');
      let modeValue=3;
      if(mode==="Current")
      {
        modeValue=0;
        slider.min = -910;
        slider.max = 910;
        slider.value = 0;
      }
      else if(mode==="Speed")
      {
        modeValue=1;
        slider.min = -320;
        slider.max = 320;
        slider.value = 0;
      }
      else if(mode==="Position")
      {
        modeValue=3;
        slider.min = 0;
        slider.max = 4095;
        slider.value = 2048;
      }
      else if(mode==="ExtendedPosition")
      {
        modeValue=4;
        slider.min = -4095;
        slider.max = 4095;
        slider.value = 0;
      }
      document.getElementById('motor2Value').textContent = slider.value;
      await sendWriteCommand(id, 64, 0);//トルクオフ
      document.getElementById('isMotor2Enable').checked = false;
      await sleep(100);
      await sendWriteCommand(id, 11, modeValue);
      console.log(`モータ${id}のモードを ${mode} (値:${modeValue}) に変更しました`);
    });

    //キーボード入力
    document.addEventListener('keydown', (event)=>{
      if(event.target.tagName === 'INPUT' && event.target.type !== 'range')return;
      slider1 = document.getElementById('motor1Slider');
      slider2 = document.getElementById('motor2Slider');
      let val1 = parseInt(slider1.value, 10);
      let val2 = parseInt(slider2.value, 10);

      switch(event.key.toLowerCase()){
        case 'a':
          val1 = Math.max(val1 - 20, parseInt(motor1Slider.min, 10));
          break;
        case 'd':
          val1 = Math.min(val1 + 20, parseInt(motor1Slider.max, 10));
          break;
        case 's':
          val1 = 0;
          break;
        case 'j':
          val2 = Math.max(val2 - 1, parseInt(motor2Slider.min, 10));
          break;
        case 'l':
          val2 = Math.min(val2 + 1, parseInt(motor2Slider.max, 10));
          break;
        case 'k':
          val2 = 0;
          break;
      }

      if(slider1.value !== val1.toString()){
        slider1.value = val1;
        document.getElementById('motor1Value').textContent = val1;
        updateMotor1(val1);
        console.log("Motor1 Range:", val1);
      }
      if(slider2.value !== val2.toString()){
        slider2.value = val2;
        document.getElementById('motor2Value').textContent = val2;
        updateMotor2(val2);
        console.log("Motor2 Range:", val2);
      }
    })

    // CRC-16 計算関数
    function calculateDynamixelCRC(data) {
      let crc = 0;
      for (let i = 0; i < data.length; i++) {
        crc ^= (data[i] << 8);
        for (let j = 0; j < 8; j++) {
          if ((crc & 0x8000) !== 0) {
            crc = ((crc << 1) ^ 0x8005) & 0xFFFF;
          } else {
            crc = (crc << 1) & 0xFFFF;
          }
        }
      }
      return crc;
    }

    function setupWheelControl(sliderId, outputId, updateFunc){
      const slider = document.getElementById(sliderId);
      slider.addEventListener('wheel', (event)=>{
        event.preventDefault();
        let val = parseInt(slider.value, 10);
        const step = 100;
        if(event.deltaY > 0){
          val = Math.max(val - step, parseInt(slider.min, 10));
        }else if(event.deltaY < 0){
          val = Math.min(val + step, parseInt(slider.max, 10));
        }
        if(slider.value !== val.toString()){
          slider.value = val;
          document.getElementById(outputId).textContent = val;
          updateFunc(val);
        }
      },{passive: false});
    }
    setupWheelControl('motor1Slider', 'motor1Value', updateMotor1);
    setupWheelControl('motor2Slider', 'motor2Value', updateMotor2);

    // --- ★追加：数秒で自動で消えるメッセージ表示関数 ---
    function showMessage(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.style.display = 'block';
      toast.style.opacity = '1';
      
      // 3秒後（3000ミリ秒後）に透明にして、さらにその後に完全に隠す
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.style.display = 'none', 300);
      }, 3000);
    }
  </script>
</body>
</html>
