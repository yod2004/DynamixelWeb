<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DynamixelWeb - Refactored</title>
</head>
<body>
  <div id="toast" style="display:none; position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.8); color:#fff; padding:10px 20px; border-radius:5px; z-index:1000; transition: opacity 0.3s;"></div>
  <button id="connectBtn">CONNECT USB</button>
  <button id="allEnableBtn">ALL ENABLE</button>
  
  <fieldset>
    <legend>MOTOR1</legend>
    <label>ID:<input type="number" id="motor1Id" value="1" min="1" max="253" style="width: 50px;"></label>
    <label>LED:<input type="checkbox" id="isMotor1Led"/></label>
    <label>ENABLE:<input type="checkbox" id="isMotor1Enable"/></label>
    <select id="motor1Mode">
      <option value="Current">Current</option>
      <option value="Speed">Speed</option>
      <option value="Position">Position</option>
      <option value="ExtendedPosition" selected>Extended Position</option>
    </select>
    A←<input type="range" min="-4095" max="4095" id="motor1Slider"/>→D
    <output id="motor1Value">0</output>
    <output id="motor1RealValue">0</output>
  </fieldset>
  
  <fieldset>
    <legend>MOTOR2</legend>
    <label>ID:<input type="number" id="motor2Id" value="2" min="1" max="253" style="width: 50px;"></label>
    <label>LED:<input type="checkbox" id="isMotor2Led"/></label>
    <label>ENABLE:<input type="checkbox" id="isMotor2Enable"/></label>
    <select id="motor2Mode">
      <option value="Current">Current</option>
      <option value="Speed">Speed</option>
      <option value="Position">Position</option>
      <option value="ExtendedPosition" selected>Extended Position</option>
    </select>
    J←<input type="range" min="-4095" max="4095" id="motor2Slider"/>→L
    <output id="motor2Value">0</output>
    <output id="motor2RealValue">0</output>
  </fieldset>

  <fieldset>
    <legend>MOTOR3</legend>
    <label>ID:<input type="number" id="motor3Id" value="3" min="1" max="253" style="width: 50px;"></label>
    <label>LED:<input type="checkbox" id="isMotor3Led"/></label>
    <label>ENABLE:<input type="checkbox" id="isMotor3Enable"/></label>
    <select id="motor3Mode">
      <option value="Current">Current</option>
      <option value="Speed">Speed</option>
      <option value="Position">Position</option>
      <option value="ExtendedPosition" selected>Extended Position</option>
    </select>
    F←<input type="range" min="-4095" max="4095" id="motor3Slider"/>→H
    <output id="motor3Value">0</output>
    <output id="motor3RealValue">0</output>
  </fieldset>

  <fieldset style="margin-top: 20px;">
    <legend>SCRIPT RUNNER</legend>
    <input type="file" id="fileInput" accept=".txt">
    <button id="runScriptBtn">RUN</button>
    <button id="stopBtn" style="background-color: #ff4444; color: white; font-weight: bold; padding: 5px 15px; border: none; border-radius: 3px; cursor: pointer; margin-left: 10px;">STOP</button>
  </fieldset>

  <script>
    // ==========================================
    // ユーティリティ
    // ==========================================
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function showMessage(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.style.display = 'block';
      toast.style.opacity = '1';
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.style.display = 'none', 300);
      }, 3000);
    }

    // ==========================================
    // 通信管理クラス
    // ==========================================
    class DynamixelConnection {
      constructor() {
        this.port = null;
        this.writer = null;
        this.rxBuffer = new Uint8Array(0);
        this.keepReading = true;
      }

      async connect() {
        try {
          this.port = await navigator.serial.requestPort();
          await this.port.open({ baudRate: 57600 });
          this.writer = this.port.writable.getWriter();
          this.listenToPort(); // バケツループ開始
          showMessage("接続完了");
          console.log("接続完了");
        } catch (error) {
          console.error("接続エラー:", error);
          showMessage("接続に失敗しました");
        }
      }

      async listenToPort() {
        while (this.keepReading && this.port && this.port.readable) {
          const reader = this.port.readable.getReader();
          try {
            while (true) {
              const { value, done } = await reader.read();
              if (done) break;
              if (value) {
                const newBuf = new Uint8Array(this.rxBuffer.length + value.length);
                newBuf.set(this.rxBuffer);
                newBuf.set(value, this.rxBuffer.length);
                this.rxBuffer = newBuf;
                if (this.rxBuffer.length > 1024) this.rxBuffer = this.rxBuffer.slice(-1024);
              }
            }
          } catch (error) {
            // ノイズ無視
          } finally {
            reader.releaseLock();
          }
          await sleep(10);
        }
      }

      calculateCRC(data) {
        let crc = 0;
        for (let i = 0; i < data.length; i++) {
          crc ^= (data[i] << 8);
          for (let j = 0; j < 8; j++) {
            if ((crc & 0x8000) !== 0) crc = ((crc << 1) ^ 0x8005) & 0xFFFF;
            else crc = (crc << 1) & 0xFFFF;
          }
        }
        return crc;
      }

      async writePacket(id, instruction, address, dataBytes) {
        if (!this.writer) return;
        const length = dataBytes.length + 5;
        const payload = new Uint8Array([
          0xFF, 0xFF, 0xFD, 0x00, id, 
          length & 0xFF, (length >> 8) & 0xFF, 
          instruction, address & 0xFF, (address >> 8) & 0xFF, 
          ...dataBytes
        ]);
        const crc = this.calculateCRC(payload);
        const packet = new Uint8Array(payload.length + 2);
        packet.set(payload);
        packet[payload.length] = crc & 0xFF;
        packet[payload.length + 1] = (crc >> 8) & 0xFF;
        await this.writer.write(packet);
      }

      // バイト数を指定して書き込む汎用メソッド
      async writeCommand(id, address, dataValue, byteSize = 1) {
        let data = [];
        let unsignedVal = dataValue;
        if (byteSize === 2) unsignedVal = (dataValue < 0) ? dataValue + 65536 : dataValue;
        if (byteSize === 4) unsignedVal = dataValue >>> 0;

        for (let i = 0; i < byteSize; i++) {
          data.push((unsignedVal >> (i * 8)) & 0xFF);
        }
        await this.writePacket(id, 0x03, address, data);
      }

      async readPresentPosition(id) {
        if (!this.port || !this.writer) return null;
        this.rxBuffer = new Uint8Array(0);
        await this.writePacket(id, 0x02, 132, [0x04, 0x00]); // Instruction: 0x02 (Read)
        
        for (let i = 0; i < 15; i++) {
          await sleep(10);
          if (this.rxBuffer.length >= 15) {
            for (let j = 0; j <= this.rxBuffer.length - 15; j++) {
              if (this.rxBuffer[j]===0xFF && this.rxBuffer[j+1]===0xFF && this.rxBuffer[j+2]===0xFD && 
                  this.rxBuffer[j+4]===id && this.rxBuffer[j+7]===0x55) {
                 let rawPos = this.rxBuffer[j+9] | (this.rxBuffer[j+10]<<8) | (this.rxBuffer[j+11]<<16) | (this.rxBuffer[j+12]<<24);
                 return rawPos | 0;
              }
            }
          }
        }
        return null;
      }
    }

    // ==========================================
    // モーター管理クラス
    // ==========================================
    class Motor {
      constructor(prefix, connection, keyBinds) {
        this.prefix = prefix;
        this.conn = connection;
        this.keys = keyBinds; // { left, right, stop }

        // DOM要素のバインド
        const capitalize = prefix.charAt(0).toUpperCase() + prefix.slice(1);
        this.idInput = document.getElementById(`${prefix}Id`);
        this.ledCheck = document.getElementById(`is${capitalize}Led`);
        this.enableCheck = document.getElementById(`is${capitalize}Enable`);
        this.modeSelect = document.getElementById(`${prefix}Mode`);
        this.slider = document.getElementById(`${prefix}Slider`);
        this.valueOut = document.getElementById(`${prefix}Value`);
        this.realValueOut = document.getElementById(`${prefix}RealValue`);

        this.initEvents();
      }

      get id() { return parseInt(this.idInput.value, 10); }
      get value() { return parseInt(this.slider.value, 10); }

      initEvents() {
        this.ledCheck.addEventListener('change', (e) => this.conn.writeCommand(this.id, 0x41, e.target.checked ? 1 : 0, 1));
        this.enableCheck.addEventListener('change', (e) => this.conn.writeCommand(this.id, 64, e.target.checked ? 1 : 0, 1));
        
        this.slider.addEventListener('input', (e) => {
          this.valueOut.textContent = e.target.value;
          this.syncToMotor();
        });

        this.modeSelect.addEventListener('change', () => this.changeMode());

        this.slider.addEventListener('wheel', (e) => {
          e.preventDefault();
          let val = this.value;
          const step = 50;
          if (e.deltaY > 0) val = Math.max(val - step, parseInt(this.slider.min, 10));
          else if (e.deltaY < 0) val = Math.min(val + step, parseInt(this.slider.max, 10));
          this.setSliderValue(val);
        }, { passive: false });
      }

      setSliderValue(val) {
        if (this.slider.value !== val.toString()) {
          this.slider.value = val;
          this.valueOut.textContent = val;
          this.syncToMotor();
        }
      }

      syncToMotor() {
        const mode = this.modeSelect.value;
        const val = this.value;
        if (mode === 'Speed') this.conn.writeCommand(this.id, 104, val, 4);
        else if (mode === 'Position' || mode === 'ExtendedPosition') this.conn.writeCommand(this.id, 116, val, 4);
        else if (mode === 'Current') this.conn.writeCommand(this.id, 102, val, 2);
      }

      async changeMode() {
        const mode = this.modeSelect.value;
        let modeValue = 3;
        if (mode === "Current") { modeValue = 0; this.slider.min = -910; this.slider.max = 910; this.slider.value = 0; }
        else if (mode === "Speed") { modeValue = 1; this.slider.min = -320; this.slider.max = 320; this.slider.value = 0; }
        else if (mode === "Position") { modeValue = 3; this.slider.min = 0; this.slider.max = 4095; this.slider.value = 2048; }
        else if (mode === "ExtendedPosition") { modeValue = 4; this.slider.min = -4095; this.slider.max = 4095; this.slider.value = 0; }

        this.valueOut.textContent = this.slider.value;
        await this.conn.writeCommand(this.id, 64, 0, 1); // Torque OFF
        this.enableCheck.checked = false;
        await sleep(100);
        await this.conn.writeCommand(this.id, 11, modeValue, 1);
        console.log(`モータ${this.id}を ${mode} に変更しました`);
      }

      handleKey(key) {
        let val = this.value;
        if (key === this.keys.left) val = Math.max(val - 20, parseInt(this.slider.min, 10));
        else if (key === this.keys.right) val = Math.min(val + 20, parseInt(this.slider.max, 10));
        else if (key === this.keys.stop) val = 0;
        else return;

        this.setSliderValue(val);
      }
    }

    // ==========================================
    // スクリプト実行管理クラス
    // ==========================================
    class ScriptRunner {
      constructor(connection, motors) {
        this.conn = connection;
        this.motors = motors; // Motorインスタンスの配列
        this.commands = [];
        this.isRunning = false;

        document.getElementById('fileInput').addEventListener('change', (e) => this.loadFile(e));
        document.getElementById('runScriptBtn').addEventListener('click', () => this.run());
        document.getElementById('stopBtn').addEventListener('click', () => this.stop());
      }

      loadFile(e) {
        if (!e.target.files || e.target.files.length === 0) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          this.commands = event.target.result.split('\n').filter(line => line.trim() !== '');
          showMessage(`ファイルを読み込みました（全${this.commands.length}行）`);
        };
        reader.readAsText(e.target.files[0]);
      }

      async run() {
        if (this.commands.length === 0) { showMessage("先にテキストファイルを読み込んでください"); return; }
        this.isRunning = true;
        showMessage("スクリプト実行開始");

        for (let i = 0; i < this.commands.length; i++) {
          if (!this.isRunning) { showMessage("スクリプトを強制中断しました"); break; }
          
          const parts = this.commands[i].trim().split(/\s+/);
          if (parts.length < 2) continue;
          
          const mask = parseInt(parts[0], 10);
          const commandStr = parts[1];
          const value = parseInt(commandStr, 10);
          const isRelative = commandStr.startsWith('+') || commandStr.startsWith('-');
          
          let targetValues = [];

          // 各モーターにコマンドを適用
          for (let index = 0; index < this.motors.length; index++) {
            if (mask & (1 << index)) {
              const motor = this.motors[index];
              let targetVal;
              if (isRelative) {
                let currentPos = await this.conn.readPresentPosition(motor.id);
                if (currentPos === null) currentPos = motor.value;
                targetVal = currentPos + value;
              } else {
                targetVal = value;
              }
              targetVal = Math.max(parseInt(motor.slider.min, 10), Math.min(parseInt(motor.slider.max, 10), targetVal));
              motor.setSliderValue(targetVal);
              targetValues[index] = targetVal;
            }
          }

          // 位置決め待機ループ
          let timeoutCounter = 0;
          while (this.isRunning) {
            let allReached = true;
            for (let index = 0; index < this.motors.length; index++) {
              if (mask & (1 << index) && targetValues[index] !== undefined) {
                const motor = this.motors[index];
                let p = await this.conn.readPresentPosition(motor.id);
                if (p !== null) {
                  motor.realValueOut.textContent = p.toString();
                  if (Math.abs(targetValues[index] - p) > 50) allReached = false;
                } else {
                  allReached = false;
                }
              }
            }
            if (allReached) break;
            timeoutCounter++;
            if (timeoutCounter > 50) break; // 5秒タイムアウト
            await sleep(100);
          }
        }
        
        if (this.isRunning) {
          showMessage("スクリプト実行完了");
          this.isRunning = false;
        }
      }

      stop() {
        this.isRunning = false;
        this.motors.forEach(motor => {
          this.conn.writeCommand(motor.id, 64, 0, 1); // Torque OFF
          motor.enableCheck.checked = false;
        });
        showMessage("緊急停止しました！(トルクOFF)");
      }
    }

    // ==========================================
    // メイン処理（初期化）
    // ==========================================
    const conn = new DynamixelConnection();
    
    // UIのプレフィックス名とキーバインドを渡してモーターを作成
    const motor1 = new Motor('motor1', conn, { left: 'a', right: 'd', stop: 's' });
    const motor2 = new Motor('motor2', conn, { left: 'j', right: 'l', stop: 'k' });
    const motor3 = new Motor('motor3', conn, { left: 'f', right: 'h', stop: 'g' });
    const motors = [motor1, motor2, motor3];

    const scriptRunner = new ScriptRunner(conn, motors);

    document.getElementById('connectBtn').addEventListener('click', () => conn.connect());

    // グローバルキーボードイベントを各モーターに分配
    document.addEventListener('keydown', (event) => {
      if (event.target.tagName === 'INPUT' && event.target.type !== 'range') return;
      const key = event.key.toLowerCase();
      motors.forEach(motor => motor.handleKey(key));
    });

    document.getElementById('allEnableBtn').addEventListener('click', ()=>{
      motors.forEach(motor=>{
        motor.enableCheck.checked = true;
        motor.conn.writeCommand(motor.id, 64, 1, 1);
      });
      showMessage("全てのモータをENABLEにしました")
    });

  </script>
</body>
</html>
